version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: phase4/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - .:/app
    env_file:
      - .env
    environment:
      - OUTPUT_DIR=/app/outputs
      - FFMPEG_PATH=ffmpeg
    networks:
      - animai-net

  frontend:
    build:
      context: .
      dockerfile: phase4/frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./phase4/frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - animai-net

networks:
  animai-net:
    driver: bridge
